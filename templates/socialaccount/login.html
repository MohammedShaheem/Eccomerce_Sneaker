<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Google</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .google-icon {
      width: 48px;        /* fixed pixel size, no Tailwind needed */
      height: 48px;
      margin: 0 auto 16px;
      display: block;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 16px;
      background: white;
      color: #374151;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .google-btn:hover { background: #f8fafc; }

    .google-btn img {
      width: 20px;      /* fixed size */
      height: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <img 
      src="https://www.svgrepo.com/show/475656/google-color.svg" 
      alt="Google Logo" 
      class="google-icon"
    >

    <h2>Sign in with Google</h2>
    <p>You'll be redirected to Google to complete sign-in.</p>

    <form method="post" action="{{ redirect_url }}">
      {% csrf_token %}
      <input type="hidden" name="process" value="{{ process }}" />
      <input type="hidden" name="scope" value="{{ scope }}" />
      <input type="hidden" name="callback_url" value="{{ callback_url }}" />

      <button type="submit" class="google-btn">
        <img 
          src="https://www.svgrepo.com/show/475656/google-color.svg" 
          alt=""
        >
        Continue with Google
      </button>
    </form>
  </div>

</body>
</html>
